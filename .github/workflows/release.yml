name: Build & Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────
  #  阶段 1：检测 commit 是否包含版本号
  # ─────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 解析 commit 版本号
        id: check
        shell: bash
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "📝 Commit 信息: $MSG"

          # 提取版本号 Vx.y 或 Vx.y.z
          VER=$(echo "$MSG" | grep -oE 'V[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)

          if [ -z "$VER" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "❌ 未检测到版本号，跳过发版"
            exit 0
          fi

          # 任何版本号都触发发版（大/中/小版本号均打包）
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "✅ 检测到版本: $VER → 触发发版"

  # ─────────────────────────────────────────────────────────
  #  阶段 2：打包 EXE + 发布 Release
  # ─────────────────────────────────────────────────────────
  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 打包 EXE
        shell: pwsh
        run: python build_exe.py

      - name: 📤 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          name: ${{ needs.check.outputs.version }}
          body: |
            ## GBFR AutoReBattle ${{ needs.check.outputs.version }}

            ### 🔧 更新内容

            查看 [commit 详情](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ### 📥 使用方法

            1. 下载 `GBFR_AutoReBattle.exe`
            2. 放置在任意目录
            3. 启动游戏 → 屏幕显示「跳跃」时按 `F1` 启动
            4. 按 `F2` 停止

            ### ⚠️ 注意事项

            - 分辨率 **1920×1080 及以上**
            - 游戏使用 **无边框窗口** 或 **窗口化**
            - 以 **管理员身份** 运行 EXE
            - 启动时不要遮挡游戏窗口
          files: dist/GBFR_AutoReBattle.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
