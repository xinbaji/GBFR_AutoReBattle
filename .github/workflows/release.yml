name: Build & Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────
  #  阶段 1：检测 commit 是否包含中/大版本号
  # ─────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 解析 commit 版本号
        id: check
        shell: bash
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "📝 Commit 信息: $MSG"

          # 提取版本号 Vx.y 或 Vx.y.z
          VER=$(echo "$MSG" | grep -oE 'V[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)

          if [ -z "$VER" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "❌ 未检测到版本号，跳过发版"
            exit 0
          fi

          echo "🔍 检测到版本: $VER"

          # 按 . 拆开
          RAW=$(echo "$VER" | sed 's/^V//')
          MAJOR=$(echo "$RAW" | cut -d. -f1)
          MINOR=$(echo "$RAW" | cut -d. -f2)
          PATCH=$(echo "$RAW" | cut -d. -f3)

          echo "  Major = $MAJOR"
          echo "  Minor = $MINOR"
          echo "  Patch = ${PATCH:-无}"

          # ── 判定规则 ──
          #   PATCH 为空（V1.1 格式）  → 中/大版本 → 发版 ✅
          #   PATCH = 0（V1.1.0 格式）→ 中/大版本 → 发版 ✅
          #   PATCH > 0（V1.0.1 格式）→ 小版本   → 跳过 ⏭
          if [ -z "$PATCH" ] || [ "$PATCH" = "0" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
            echo "✅ 中/大版本更新 → 触发发版"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=$VER" >> "$GITHUB_OUTPUT"
            echo "⏭ 小版本更新 (PATCH=$PATCH) → 跳过发版"
          fi

  # ─────────────────────────────────────────────────────────
  #  阶段 2：打包 EXE + 发布 Release
  # ─────────────────────────────────────────────────────────
  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 打包 EXE
        shell: pwsh
        run: python build_exe.py

      - name: 📤 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          name: ${{ needs.check.outputs.version }}
          body: |
            ## GBFR AutoReBattle ${{ needs.check.outputs.version }}

            ### 🔧 更新内容

            查看 [commit 详情](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ### 📥 使用方法

            1. 下载 `GBFR_AutoReBattle.exe`
            2. 放置在任意目录
            3. 启动游戏 → 屏幕显示「跳跃」时按 `F1` 启动
            4. 按 `F2` 停止

            ### ⚠️ 注意事项

            - 分辨率 **1920×1080 及以上**
            - 游戏使用 **无边框窗口** 或 **窗口化**
            - 以 **管理员身份** 运行 EXE
            - 启动时不要遮挡游戏窗口
          files: dist/GBFR_AutoReBattle.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
